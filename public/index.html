<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Week 15 Express Lab</title>
</head>
<body style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 700px; margin: 2rem auto; padding: 1rem;">
  <h1>Week 15 - Express Backend Demo</h1>

  <p>
    This page is being served by your Express server. Click the button to load items 
    from your <code>/api/items</code> route.
  </p>

  <button id="loadBtn" style="padding: 0.5rem 1rem; margin-bottom: 1rem;">
    Load Items From API
  </button>

  <ul id="itemList"></ul>

  <script>
    const button = document.getElementById("loadBtn");
    const list = document.getElementById("itemList");

    button.addEventListener("click", async () => {
      try {
        // Call your own backend on the same server
        const response = await fetch("/api/items");
        const data = await response.json();

        // Clear the existing list
        list.innerHTML = "";

        // Render each item as an <li>
        data.forEach(item => {
          const li = document.createElement("li");
          li.textContent = `${item.id}. ${item.name}`;
          list.appendChild(li);
        });
      } catch (error) {
        console.error("Error fetching items:", error);
      }
    });
  </script>
</body>
</html>
